<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>equipdiag — Diagnostic Code Reference</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0d0d0d; color: #e0e0e0; min-height: 100vh; }

/* Header */
.header { background: linear-gradient(135deg, #0d0d0d 0%, #1a0a0a 100%); border-bottom: 1px solid #2a1a1a; padding: 0; position: sticky; top: 0; z-index: 100; }
.header-inner { max-width: 1200px; margin: 0 auto; padding: 0.75rem 1.5rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
.header-left { display: flex; align-items: center; gap: 0.75rem; }
.logo { width: 32px; height: 32px; background: #e94560; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1rem; color: #fff; }
.header h1 { font-size: 1.15rem; color: #e0e0e0; font-weight: 600; letter-spacing: 0.3px; }
.header h1 span { color: #e94560; }
.header .subtitle { color: #666; font-size: 0.8rem; }

/* Nav tabs */
.nav { display: flex; gap: 0; background: #111; border-bottom: 1px solid #1a1a1a; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.nav-inner { max-width: 1200px; margin: 0 auto; width: 100%; display: flex; }
.nav button { flex: 0 0 auto; padding: 0.65rem 1.25rem; border: none; background: transparent; color: #666; font-size: 0.85rem; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; white-space: nowrap; }
.nav button:hover { color: #aaa; }
.nav button.active { color: #e94560; border-bottom-color: #e94560; background: #0d0d0d; }

.container { max-width: 1200px; margin: 0 auto; padding: 1.25rem 1.5rem; }

/* Stats bar */
.stats { display: flex; gap: 0; background: #111; border: 1px solid #1a1a1a; border-radius: 8px; overflow: hidden; margin-bottom: 1.25rem; }
.stat-item { flex: 1; padding: 0.75rem 0.5rem; text-align: center; border-right: 1px solid #1a1a1a; }
.stat-item:last-child { border-right: none; }
.stat-item .num { font-size: 1.3rem; font-weight: 700; color: #e94560; line-height: 1.2; }
.stat-item .label { font-size: 0.7rem; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }

/* Section */
.section-title { font-size: 1rem; color: #888; font-weight: 600; margin-bottom: 0.75rem; letter-spacing: 0.3px; }

/* Search panel */
.search-panel { background: #111; border: 1px solid #1a1a1a; border-radius: 8px; padding: 1rem; margin-bottom: 1.25rem; }
.search-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }
.search-row input { flex: 1; min-width: 180px; padding: 0.6rem 0.9rem; border: 1px solid #222; border-radius: 6px; background: #0a0a0a; color: #e0e0e0; font-size: 0.9rem; }
.search-row input:focus { outline: none; border-color: #e94560; }
.search-row button { padding: 0.6rem 1.25rem; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 0.85rem; transition: 0.15s; }
.btn-primary { background: #e94560; color: #fff; }
.btn-primary:hover { background: #d63851; }
.btn-ghost { background: transparent; border: 1px solid #333 !important; color: #888; }
.btn-ghost:hover { border-color: #555; color: #ccc; }

/* Filter chips */
.filter-chips { display: flex; gap: 0.35rem; flex-wrap: wrap; margin: 0.75rem 0 0.25rem; }
.chip { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.7rem; font-weight: 500; border: 1px solid #222; background: #111; color: #666; cursor: pointer; transition: 0.1s; }
.chip:hover { border-color: #444; color: #999; }
.chip.active { border-color: #e94560; color: #e94560; background: #1a0a0a; }
.chip-detail { color: #555; font-weight: 400; }

/* Code cards */
.code-card { background: #111; border: 1px solid #1a1a1a; border-radius: 6px; padding: 0.85rem; margin-bottom: 0.5rem; }
.code-card .top { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
.code-card .code-num { color: #e94560; font-weight: 700; font-size: 1.1rem; }
.code-card .code-desc { color: #bbb; margin-top: 0.25rem; font-size: 0.9rem; line-height: 1.4; }
.code-card .code-source { font-size: 0.75rem; color: #444; margin-top: 0.35rem; }
.code-card .code-fmi { font-size: 0.8rem; color: #666; margin-top: 0.2rem; }

/* Standard badges */
.std-badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 0.65rem; font-weight: 600; vertical-align: middle; }
.std-J1939 { background: #0a2a1a; color: #66dd99; border: 1px solid #1a4a2a; }
.std-J1939-DEUTZ { background: #0a2a2a; color: #66dddd; border: 1px solid #1a4a4a; }
.std-J1939-Cummins { background: #0a1a2a; color: #6699dd; border: 1px solid #1a2a4a; }
.std-J1587 { background: #2a1a0a; color: #dd9966; border: 1px solid #4a2a1a; }
.std-J1708 { background: #1a0a2a; color: #9966dd; border: 1px solid #2a1a4a; }
.std-J1708-J1587-J1939 { background: #1a1a2a; color: #9999dd; border: 1px solid #2a2a4a; }
.std-CNH { background: #2a0a0a; color: #dd6666; border: 1px solid #4a1a1a; }
.std-Ford { background: #0a1a2a; color: #6699dd; border: 1px solid #1a2a4a; }
.std-DEUTZ { background: #0a2a0a; color: #66dd66; border: 1px solid #1a4a1a; }
.std-Isuzu { background: #1a1a0a; color: #dddd66; border: 1px solid #4a4a1a; }
.std-MEC { background: #0a1a1a; color: #66dddd; border: 1px solid #1a4a4a; }
.std-Daewoo { background: #2a1a1a; color: #dd9966; border: 1px solid #4a2a2a; }
.std-Doosan { background: #1a0a1a; color: #dd66dd; border: 1px solid #4a1a4a; }
.std-GM { background: #1a1a2a; color: #aaaadd; border: 1px solid #2a2a4a; }
.std-Perkins { background: #0a2a1a; color: #88dd88; border: 1px solid #1a4a2a; }
.std-Unk { background: #1a1a1a; color: #888; border: 1px solid #333; }

/* FMI badge */
.fmi-badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 0.7rem; }
.fmi-0, .fmi-1 { background: #6b0000; color: #ff8888; }
.fmi-2 { background: #6b4a00; color: #ffbb44; }
.fmi-3, .fmi-4 { background: #4a006b; color: #cc88ff; }
.fmi-5, .fmi-6 { background: #00306b; color: #88bbff; }
.fmi-7 { background: #006b4a; color: #88ffbb; }
.fmi-8, .fmi-9, .fmi-10, .fmi-11 { background: #2a2a00; color: #cccc66; }
.fmi-12 { background: #6b0030; color: #ff88bb; }
.fmi-13, .fmi-14, .fmi-15 { background: #004a4a; color: #66cccc; }
.fmi-16, .fmi-17 { background: #2a004a; color: #bb88ff; }
.fmi-18, .fmi-19 { background: #00306b; color: #88bbff; }
.fmi-31 { background: #2a4a00; color: #aadd66; }

/* Procedure cards */
.proc-card { background: #111; border: 1px solid #1a1a1a; border-radius: 6px; padding: 0.85rem; margin-bottom: 0.5rem; cursor: pointer; transition: 0.15s; }
.proc-card:hover { border-color: #e94560; }
.proc-card .proc-machine { color: #e94560; font-weight: 600; font-size: 0.9rem; }
.proc-card .proc-title { color: #ccc; margin-top: 0.2rem; font-size: 0.9rem; }
.proc-card .proc-meta { margin-top: 0.3rem; display: flex; gap: 0.35rem; flex-wrap: wrap; }
.proc-tag { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 0.65rem; background: #1a1a2e; color: #777; }
.tag-qa { background: #1a2a1a; color: #88cc88; }

/* Category groups */
.cat-group { margin-bottom: 1.25rem; }
.cat-header { display: flex; align-items: center; justify-content: space-between; padding: 0.5rem 0.75rem; margin-bottom: 0.5rem; border-bottom: 1px solid #1a1a1a; color: #888; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-header-accent { color: #e94560; border-bottom-color: #e94560; }
.cat-count { font-size: 0.75rem; color: #555; background: #111; padding: 0.1rem 0.5rem; border-radius: 8px; }
.proc-card .proc-category { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.5px; color: #555; margin-bottom: 0.15rem; font-weight: 600; }
.proc-card .cat-badge-accent { color: #e94560; }
.chip-accent { border-color: #e94560 !important; color: #e94560 !important; background: #1a0a0a !important; }
.chip-accent.active { background: #2a1010 !important; }

/* Procedure detail */
.proc-detail { background: #111; border: 1px solid #1a1a1a; border-radius: 8px; padding: 1.5rem; line-height: 1.65; }
.proc-detail h1 { color: #e94560; font-size: 1.25rem; margin-bottom: 0.5rem; }
.proc-detail .equip-info { color: #666; font-size: 0.85rem; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid #1a1a1a; }
.proc-detail h2 { color: #e0e0e0; font-size: 1.05rem; margin: 1rem 0 0.5rem; }
.proc-detail p { margin: 0.5rem 0; color: #bbb; }
.proc-detail li { margin: 0.3rem 0; color: #bbb; }
.proc-detail ul, .proc-detail ol { margin: 0.5rem 0; padding-left: 1.5rem; }
.proc-detail code { background: #1a1a2e; padding: 0.1rem 0.3rem; border-radius: 3px; font-size: 0.85rem; }
.proc-detail pre { background: #0a0a0a; padding: 1rem; border-radius: 6px; overflow-x: auto; margin: 0.5rem 0; }
.proc-detail blockquote { border-left: 3px solid #e94560; padding-left: 0.75rem; margin: 0.5rem 0; color: #777; }

/* Source cards */
.source-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 0.5rem; }
.source-card { background: #111; border: 1px solid #1a1a1a; border-radius: 6px; padding: 0.85rem; cursor: pointer; transition: 0.15s; }
.source-card:hover { border-color: #e94560; }
.source-card .s-name { color: #ccc; font-weight: 500; font-size: 0.85rem; }
.source-card .s-meta { color: #555; font-size: 0.75rem; margin-top: 0.2rem; }
.source-card .s-count { color: #e94560; font-weight: 700; }

/* FMI table */
.fmi-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
.fmi-table th { text-align: left; padding: 0.5rem; border-bottom: 1px solid #1a1a1a; color: #555; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; }
.fmi-table td { padding: 0.45rem 0.5rem; border-bottom: 1px solid #111; }
.fmi-table tr:hover td { background: #0a0a0a; }

/* Pagination */
.pagination { display: flex; gap: 0.5rem; align-items: center; margin-top: 0.75rem; justify-content: center; }
.pagination button { padding: 0.35rem 0.75rem; border: 1px solid #222; border-radius: 4px; background: transparent; color: #666; cursor: pointer; font-size: 0.8rem; }
.pagination button:hover { border-color: #444; color: #999; }
.pagination .page-info { color: #444; font-size: 0.8rem; }

/* Back button */
.back { display: inline-flex; align-items: center; gap: 0.3rem; color: #e94560; cursor: pointer; font-size: 0.85rem; margin-bottom: 0.75rem; }
.back:hover { text-decoration: underline; }

/* Hide */
.hidden { display: none !important; }

/* Empty state */
.empty-state { text-align: center; padding: 2rem 1rem; color: #444; font-size: 0.85rem; }
.empty-state strong { color: #666; }

/* Responsive */
@media (max-width: 768px) {
  .header-inner { padding: 0.5rem 1rem; }
  .container { padding: 1rem; }
  .stats { flex-wrap: wrap; gap: 0; }
  .stat-item { flex: 1 0 45%; }
  .stat-item:nth-child(2) { border-right: none; }
  .source-grid { grid-template-columns: 1fr; }
  .proc-detail { padding: 1rem; }
  .nav button { padding: 0.55rem 0.9rem; font-size: 0.8rem; }
}

@media (max-width: 480px) {
  .stat-item .num { font-size: 1.1rem; }
  .search-row input { min-width: 120px; }
  .search-row button { padding: 0.5rem 0.8rem; font-size: 0.8rem; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-left">
      <div class="logo">E</div>
      <h1>equip<span>diag</span></h1>
    </div>
    <span class="subtitle">Heavy Equipment Diagnostics</span>
  </div>
</div>

<div class="nav">
  <div class="nav-inner">
    <button class="active" onclick="setMode('search')" id="modeSearch">Search Codes</button>
    <button onclick="setMode('quickaccess')" id="modeQuickaccess" style="color:#f0a030;">★ Quick</button>
    <button onclick="setMode('procedures')" id="modeProcedures">Procedures</button>
    <button onclick="setMode('sources')" id="modeSources">Sources</button>
    <button onclick="setMode('fmi')" id="modeFmi">FMI Ref</button>
    <button onclick="setMode('dtc')" id="modeDtc">SPN+FMI</button>
    <button onclick="setMode('ac')" id="modeAc" style="color:#00bfff;">❄ A/C</button>
  </div>
</div>

<div class="container">

<div class="stats">
  <div class="stat-item"><div class="num" id="totalCount">-</div><div class="label">Codes</div></div>
  <div class="stat-item"><div class="num" id="typeCount">-</div><div class="label">Types</div></div>
  <div class="stat-item"><div class="num" id="sourceCount">-</div><div class="label">Sources</div></div>
  <div class="stat-item"><div class="num" id="procCount">-</div><div class="label">Procedures</div></div>
</div>

<!-- ===== SEARCH ===== -->
<div id="searchMode">
  <div class="search-panel">
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="Code number, keyword, or description..." oninput="onSearchInput()" autofocus>
      <button class="btn-primary" onclick="searchCodes()">Search</button>
      <button class="btn-ghost" onclick="clearSearch()">Clear</button>
    </div>
  </div>
  <div class="section-title" id="searchResultTitle" style="display:none;"></div>
  <div id="searchResult"></div>
</div>

<!-- ===== QUICK ACCESS ===== -->
<div id="quickaccessMode" class="hidden">
  <div id="qaListContainer">
    <div class="search-panel">
      <div class="search-row">
        <input type="text" id="qaFilter" placeholder="Filter quick-access procedures...">
      </div>
      <div class="filter-chips" id="qaManuChips"></div>
      <div class="filter-chips" id="qaCatChips"></div>
    </div>
    <div id="qaList"></div>
  </div>
  <div id="qaDetailContainer" class="hidden">
    <span class="back" onclick="backToQA()">&larr; Back to quick access</span>
    <div id="qaBody" class="proc-detail"></div>
  </div>
</div>

<!-- ===== PROCEDURES ===== -->
<div id="proceduresMode" class="hidden">
  <div id="procListContainer">
    <div class="search-panel">
      <div class="search-row">
        <input type="text" id="procFilter" placeholder="Search procedures or equipment...">
      </div>
      <div class="filter-chips" id="procManuChips"></div>
      <div class="filter-chips" id="procCatChips"></div>
    </div>
    <div id="procList"></div>
  </div>
  <div id="procDetailContainer" class="hidden">
    <span class="back" onclick="backToProcedures()">&larr; Back to procedures</span>
    <div id="procBody" class="proc-detail"></div>
  </div>
</div>

<!-- ===== SOURCES ===== -->
<div id="sourcesMode" class="hidden">
  <div id="sourceListContainer">
    <div class="section-title">Document Sources</div>
    <div class="source-grid" id="sourceList"></div>
  </div>
  <div id="sourceDetailContainer" class="hidden">
    <span class="back" onclick="backToSources()">&larr; Back to sources</span>
    <div class="search-panel">
      <div class="search-row">
        <input type="text" id="sourceFilter" placeholder="Filter codes in this source...">
      </div>
    </div>
    <div id="sourceCodes"></div>
    <div id="sourcePagination" class="pagination"></div>
  </div>
</div>

<!-- ===== FMI TABLE ===== -->
<div id="fmiMode" class="hidden">
  <table class="fmi-table">
    <thead><tr><th>FMI</th><th>Description</th><th>Category</th><th>Sev</th></tr></thead>
    <tbody id="fmiBody"></tbody>
  </table>
</div>

<!-- ===== SPN+FMI DECODE ===== -->
<div id="dtcMode" class="hidden">
  <div class="search-panel">
    <div class="search-row">
      <input type="number" id="dtcSpn" placeholder="SPN e.g. 157" style="flex:1;">
      <input type="number" id="dtcFmi" placeholder="FMI e.g. 18" style="flex:0 0 100px;">
      <button class="btn-primary" onclick="decodeDTC()">Decode</button>
    </div>
  </div>
  <div id="dtcResult"></div>
</div>

<!-- ===== A/C DIAGNOSIS ===== -->
<div id="acMode" class="hidden">
  <div class="search-panel">
    <div class="search-row">
      <select id="acSubMode" onchange="renderACSubMode()" style="flex:1; min-width:200px; padding:0.6rem 0.9rem; border:1px solid #222; border-radius:6px; background:#0a0a0a; color:#e0e0e0; font-size:0.9rem;">
        <option value="identify">System Identification</option>
        <option value="pressure">Pressure Diagnosis</option>
        <option value="temperature">Temperature Testing</option>
        <option value="superheat">Superheat Calculator</option>
        <option value="leak">Leak Detection</option>
        <option value="repair">Repair Procedures</option>
        <option value="pm">PM Schedule</option>
        <option value="specs">OEM Specs</option>
        <option value="faults">HVAC Fault Codes</option>
      </select>
    </div>
  </div>
  <div id="acContent"></div>
</div>

<script>
let unifiedData = [];
let fmiData = [];
let sourcesMap = {};
let proceduresData = [];
let quickAccessData = [];
let currentSource = null;
let currentPage = 0;
let currentProc = null;
let currentQA = null;
let procFilterManu = '';
let procFilterCat = '';
let qaFilterManu = '';
let qaFilterCat = '';
const PAGE_SIZE = 50;
const MANU_LABELS = { 'genie': 'Genie', 'jlg': 'JLG', 'skyjack': 'Skyjack' };
const MANU_ORDER = ['genie', 'jlg', 'skyjack'];
const CATEGORY_LABELS = {
  'alc-500': 'ALC-500',
  'level-sensor': 'Level Sensor',
  'load-sensing': 'Load Sensing',
  'platform-overload': 'Platform Overload',
  'outrigger': 'Outrigger',
  'boom-angle-sensor': 'Boom Angle Sensor',
  'joystick': 'Joystick',
  'software-config': 'Software Config',
  'service-mode': 'Service Mode',
  'fault-codes': 'Fault Codes',
  'calibration': 'Calibration',
  'electrical': 'Electrical',
  'hydraulic': 'Hydraulic',
  'cylinders': 'Cylinders',
  'drive-system': 'Drive System',
  'steering': 'Steering',
  'oscillate': 'Oscillate',
  'structural': 'Structural',
  'platform': 'Platform',
  'turntable': 'Turntable',
  'towing': 'Towing',
  'reference': 'Reference',
  'misc': 'Misc'
};
const CATEGORY_ORDER = [
  'alc-500', 'service-mode', 'fault-codes', 'software-config',
  'joystick', 'platform-overload', 'level-sensor', 'boom-angle-sensor',
  'load-sensing', 'outrigger', 'calibration',
  'electrical', 'hydraulic', 'cylinders', 'drive-system', 'steering', 'oscillate',
  'turntable', 'structural', 'platform', 'towing', 'reference', 'misc'
];

function stdClass(std) {
  return 'std-' + std.replace(/[/\s()]/g, '-');
}

async function loadData() {
  try {
    const [unifiedRes, fmiRes, sourcesRes, procRes] = await Promise.all([
      fetch('spn-database/unified-codes.json'),
      fetch('spn-database/fmi-list.json'),
      fetch('spn-database/sources.json'),
      fetch('procedures/procedures.json').catch(() => ({ json: () => [] }))
    ]);
    unifiedData = await unifiedRes.json();
    fmiData = await fmiRes.json();
    sourcesMap = await sourcesRes.json();
    proceduresData = await procRes.json();
    quickAccessData = proceduresData.filter(p => p.quickAccess);

    const types = new Set(unifiedData.map(c => c.type));
    document.getElementById('totalCount').textContent = unifiedData.length.toLocaleString();
    document.getElementById('sourceCount').textContent = Object.keys(sourcesMap).length;
    document.getElementById('typeCount').textContent = types.size;
    document.getElementById('procCount').textContent = proceduresData.length.toLocaleString();

    renderFMI();
    renderSources();
    renderProcChips();
    renderProcedures();
    renderQAChips();
    renderQuickAccess();

    if (window.location.hash) {
      const h = window.location.hash.slice(1);
      const n = parseInt(h);
      if (!isNaN(n)) {
        setMode('search');
        document.getElementById('searchInput').value = h;
        searchCodes();
      }
    }
  } catch (e) {
    console.error('Load error:', e);
  }
}

// ===== FMI =====
function renderFMI() {
  document.getElementById('fmiBody').innerHTML = fmiData.map(f =>
    `<tr>
      <td><span class="fmi-badge fmi-${f.fmi}">FMI ${f.fmi}</span></td>
      <td>${f.desc}</td>
      <td>${f.category}</td>
      <td>${f.severity}/3</td>
    </tr>`
  ).join('');
}

// ===== SOURCES =====
function renderSources() {
  document.getElementById('sourceList').innerHTML = Object.entries(sourcesMap)
    .sort((a, b) => b[1].count - a[1].count)
    .map(([file, s]) =>
      `<div class="source-card" onclick="openSource('${file}')">
        <div class="s-name">${s.name} <span class="std-badge ${stdClass(s.type)}" style="float:right;">${s.type}</span></div>
        <div class="s-meta"><span class="s-count">${s.count}</span> codes</div>
      </div>`
    ).join('');
}

function openSource(file) {
  currentSource = file;
  currentPage = 0;
  document.getElementById('sourceListContainer').classList.add('hidden');
  document.getElementById('sourceDetailContainer').classList.remove('hidden');
  document.getElementById('sourceFilter').value = '';
  renderSourceCodes();
}

function backToSources() {
  currentSource = null;
  document.getElementById('sourceListContainer').classList.remove('hidden');

function simpleMarkdown(text) {
  // Merge consecutive blockquote lines
  const txt = text.split('\n');
  const merged = [];
  let bq = [];
  for (const l of txt) {
    if (/^>/.test(l)) { bq.push(l.replace(/^>\s?/, '')); }
    else { if (bq.length) { merged.push('>BLOCK>' + bq.join(' ')); bq = []; } merged.push(l); }
  }
  if (bq.length) merged.push('>BLOCK>' + bq.join(' '));
  text = merged.join('\n');

  let html = text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/^\*\*(.+?):\*\*/gm, '<h2>$1</h2>')
    .replace(/^>BLOCK>(.+)$/gm, '<blockquote>$1</blockquote>');
  const lines = html.split('\n');
  let inList = false;
  let result = [];
  for (let i = 0; i < lines.length; i++) {
    const l = lines[i];
    const liMatch = l.match(/^(\d+)\. (.+)/);
    const dashMatch = l.match(/^- (.+)/);
    if (liMatch) {
      if (!inList) { result.push('<ol>'); inList = 'ol'; }
      result.push(`<li>${liMatch[2]}</li>`);
    } else if (dashMatch) {
      if (inList !== 'ul') { if (inList) result.push(`</${inList}>`); result.push('<ul>'); inList = 'ul'; }
      result.push(`<li>${dashMatch[1]}</li>`);
    } else {
      if (inList) { result.push(`</${inList}>`); inList = false; }
      result.push(l);
    }
  }
  if (inList) result.push(`</${inList}>`);
  html = result.join('\n')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
  return '<p>' + html + '</p>';
}

function onSearchInput() {
  const v = document.getElementById('searchInput').value.trim();
  if (v.length >= 2) searchCodes();
  else document.getElementById('searchResult').innerHTML = '';
}

function searchCodes() {
  const val = document.getElementById('searchInput').value.trim();
  const div = document.getElementById('searchResult');
  const title = document.getElementById('searchResultTitle');
  if (!val) { div.innerHTML = ''; title.style.display = 'none'; return; }

  const num = parseInt(val);
  const isNum = !isNaN(num);
  const upper = val.toUpperCase();

  let results = isNum
    ? unifiedData.filter(c => c.code === num)
    : unifiedData.filter(c =>
        c.desc.toUpperCase().includes(upper) ||
        (c.type + ' ' + c.code).includes(upper) ||
        c.source.toUpperCase().includes(upper)
      );

  if (isNum && results.length === 0) {
    results = unifiedData.filter(c => String(c.code).startsWith(String(num)));
  }

  if (results.length === 0) {
    title.style.display = 'block';
    title.textContent = `No matches for "${val}"`;
    div.innerHTML = '<div class="empty-state">Try a different search term or browse Sources.</div>';
    return;
  }

  title.style.display = 'block';
  title.textContent = `${results.length.toLocaleString()} result${results.length !== 1 ? 's' : ''} for "${val}"`;

  const shown = results.slice(0, 200);
  div.innerHTML = shown.map(c =>
    `<div class="code-card">
      <div class="top">
        <span class="code-num">${c.type} ${c.code}</span>
        <span class="std-badge ${stdClass(c.standard)}">${c.standard}</span>
        ${c.fmi != null ? `<span class="fmi-badge fmi-${c.fmi}">FMI ${c.fmi}</span>` : ''}
      </div>
      <div class="code-desc">${c.desc}</div>
      <div class="code-source">${c.source}</div>
    </div>`
  ).join('');
  if (results.length > 200)
    div.innerHTML += `<div class="empty-state">... and ${(results.length - 200).toLocaleString()} more matches. Narrow your search.</div>`;
  if (isNum) window.location.hash = val;
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchResult').innerHTML = '';
  document.getElementById('searchResultTitle').style.display = 'none';
  window.location.hash = '';
  document.getElementById('searchInput').focus();
}

// ===== DTC DECODE =====
function decodeDTC() {
  const spn = parseInt(document.getElementById('dtcSpn').value);
  const fmi = parseInt(document.getElementById('dtcFmi').value);
  const div = document.getElementById('dtcResult');

  if (!spn || isNaN(spn)) {
    div.innerHTML = '<div class="empty-state">Enter an SPN number.</div>';
    return;
  }
  if (fmi === undefined || isNaN(fmi) || fmi < 0 || fmi > 31) {
    div.innerHTML = '<div class="empty-state">Enter a valid FMI (0-31).</div>';
    return;
  }

  const spnMatch = unifiedData.find(c => c.type === 'SPN' && c.code === spn);
  const fmiMatch = fmiData.find(f => f.fmi === fmi);

  const spnDisplay = spnMatch
    ? `${spnMatch.desc} <span class="std-badge ${stdClass(spnMatch.standard)}" style="margin-left:0.5rem;">${spnMatch.standard}</span>`
    : `<em style="color:#555;">SPN ${spn} not in database</em>`;

  div.innerHTML =
    `<div class="code-card" style="margin-top:1rem;">
      <div class="top" style="margin-bottom:0.5rem;">
        <span style="font-size:1.2rem;font-weight:700;color:#e94560;">SPN ${spn}</span>
        <span style="color:#666;">+</span>
        <span class="fmi-badge fmi-${fmi}" style="font-size:0.85rem;padding:2px 8px;">FMI ${fmi}</span>
      </div>
      <div style="margin-bottom:0.75rem;">${spnDisplay}</div>
      ${fmiMatch ? `
      <div style="background:#0a0a0a;border-radius:6px;padding:0.75rem;">
        <div style="color:#e0e0e0;font-weight:600;margin-bottom:0.25rem;">${fmiMatch.desc}</div>
        <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.5rem;">
          <span class="fmi-badge fmi-${fmi}">${fmiMatch.category}</span>
          <span class="fmi-badge fmi-${fmi}">Severity: ${fmiMatch.severity}/3</span>
        </div>
      </div>` : `<div style="color:#555;">FMI ${fmi} not in reference (valid range: 0-31)</div>`}
      ${spnMatch ? `<div class="code-source" style="margin-top:0.75rem;">Source: ${spnMatch.source}</div>` : ''}
    </div>`;
}

function diagnosePressure() {
  const low = parseFloat(document.getElementById('acLowSide').value);
  const high = parseFloat(document.getElementById('acHighSide').value);
  const div = document.getElementById('pressureDiagnosis');
  
  if (isNaN(low) || isNaN(high)) {
    div.innerHTML = '<div class="empty-state">Enter both low and high side pressures</div>';
    return;
  }
  
  const ref = document.getElementById('acRefrigerant').value;
  const ambient = parseInt(document.getElementById('acAmbient').value) || 90;
  const chart = acPressureCharts[ref];
  const key = Object.keys(chart).reduce((a, b) => Math.abs(b - ambient) < Math.abs(a - ambient) ? b : a);
  const range = chart[key];
  
  let diagnosis = '';
  let severity = '';
  
  if (low < range.low[0] && high < range.high[0]) {
    diagnosis = 'UNDERCHARGED / LEAK';
    severity = 'fmi-0';
  } else if (low > range.low[1] && high > range.high[1]) {
    diagnosis = 'OVERCHARGED / POOR CONDENSER AIRFLOW / RESTRICTION';
    severity = 'fmi-2';
  } else if (low > range.low[1] && high < range.high[0]) {
    diagnosis = 'WEAK COMPRESSOR / INTERNAL BYPASS';
    severity = 'fmi-7';
  } else if (low < range.low[0] && high > range.high[1]) {
    diagnosis = 'RESTRICTION (TXV / Orifice Tube / Receiver-Drier / Kinked Line)';
    severity = 'fmi-12';
  } else if (low >= range.low[0] && low <= range.low[1] && high >= range.high[0] && high <= range.high[1]) {
    diagnosis = 'PRESSURES NORMAL — Check temperature performance';
    severity = 'fmi-7';
  } else {
    diagnosis = 'MIXED SIGNALS — Verify readings, check for gauge errors';
    severity = 'fmi-11';
  }
  
  div.innerHTML = `
    <div class="code-card" style="margin-top:1rem; border-color:#e94560;">
      <div class="top">
        <span class="fmi-badge ${severity}" style="font-size:0.85rem;padding:4px 10px;">${diagnosis}</span>
      </div>
      <div class="code-desc" style="margin-top:0.5rem; line-height:1.6;">
        ${getPressureDetail(diagnosis)}
      </div>
    </div>
  `;
}

function getPressureDetail(diag) {
  const details = {
    'UNDERCHARGED / LEAK': 'Both pressures low. Find leak: electronic detector → nitrogen test (300 psi) → UV dye. Repair leak, replace receiver/drier, evacuate <500 microns, charge by WEIGHT.',
    'OVERCHARGED / POOR CONDENSER AIRFLOW / RESTRICTION': 'High pressures. Check: condenser fan operation/rotation, fin blockage (>30% = replace), debris between condenser/radiator, overcharge. Recover excess, verify fan.',
    'WEAK COMPRESSOR / INTERNAL BYPASS': 'High low-side + low high-side = compressor not compressing. Check: clutch engagement, variable displacement command (scanner), reed valves. Replace compressor if confirmed.',
    'RESTRICTION (TXV / Orifice Tube / Receiver-Drier / Kinked Line)': 'Low low-side + high high-side = blockage. TXV stuck closed, orifice tube plugged, receiver/drier restricted, kinked line. Frost at restriction point. Replace TXV + drier together.',
    'PRESSURES NORMAL — Check temperature performance': 'Pressures OK but poor cooling? Check: evaporator airflow (cabin filter, blower), blend door, TXV superheat, duct temperature. Proceed to Temperature Testing tab.'
  };
  return details[diag] || 'See service manual for detailed diagnosis.';
}

function calcSuperheat() {
  const psi = parseFloat(document.getElementById('shPressure').value);
  const temp = parseFloat(document.getElementById('shTemp').value);
  const ref = document.getElementById('shRefrigerant').value;
  const div = document.getElementById('shResult');
  
  if (isNaN(psi) || isNaN(temp)) { div.innerHTML = '<div class="empty-state">Enter pressure and temperature</div>'; return; }
  
  const satTemp = pressureToSatTemp(psi, ref);
  const sh = temp - satTemp;
  
  let diag = '', badge = 'fmi-7';
  if (sh > 20) { diag = 'HIGH SH: Starved evaporator — Undercharge / Restricted TXV / Plugged orifice tube / Kinked line'; badge = 'fmi-12'; }
  else if (sh > 12) { diag = 'SLIGHTLY HIGH: Slightly starved — Check charge, TXV adjustment'; badge = 'fmi-2'; }
  else if (sh >= 8) { diag = 'NORMAL (8-12°F): TXV controlling properly'; badge = 'fmi-7'; }
  else if (sh > 0) { diag = 'LOW SH: Flooded evaporator — TXV stuck open / Overcharge / Sensing bulb issue'; badge = 'fmi-3'; }
  else { diag = 'ZERO/NEGATIVE: Liquid at compressor — DANGER! TXV wide open / Severe overcharge'; badge = 'fmi-0'; }
  
  div.innerHTML = `
    <div class="code-card" style="margin-top:1rem;">
      <div class="top">
        <span class="fmi-badge ${badge}" style="font-size:0.85rem;padding:4px 10px;">Superheat: ${sh.toFixed(1)}°F (Sat: ${satTemp.toFixed(1)}°F)</span>
      </div>
      <div class="code-desc" style="margin-top:0.5rem;">${diag}</div>
    </div>
  `;
}

function pressureToSatTemp(psi, ref) {
  // Simplified saturation temp curves
  if (ref === 'r134a') {
    if (psi <= 20) return 15 + psi * 1.5;
    if (psi <= 40) return 35 + (psi - 20) * 1.0;
    if (psi <= 60) return 55 + (psi - 40) * 0.7;
    return 69 + (psi - 60) * 0.5;
  } else {
    if (psi <= 15) return 10 + psi * 1.8;
    if (psi <= 35) return 37 + (psi - 15) * 0.9;
    if (psi <= 50) return 55 + (psi - 35) * 0.7;
    return 65 + (psi - 50) * 0.5;
  }
}

}

function renderHVACFaultTable() {
  document.getElementById('hvacFaultBody').innerHTML = hvacFaults.map(f =>
    `<tr>
      <td>SPN ${f.spn}</td>
      <td>${f.desc}</td>
      <td><span class="fmi-badge fmi-${f.fmi}">FMI ${f.fmi}</span></td>
      <td>${f.fault}</td>
    </tr>`
  ).join('');
}

function filterHVACFaults() {
  const val = document.getElementById('hvacSearch').value.toLowerCase();
  const rows = document.querySelectorAll('#hvacFaultBody tr');
  rows.forEach(r => {
    const text = r.textContent.toLowerCase();
    r.style.display = text.includes(val) ? '' : 'none';
  });
}
